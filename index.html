<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Universe | Image Sequence Scrub Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      background: #000;
    }

    #scroll-space {
      width: 100%;
    }

    .immersive-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .scene canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .content {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, calc(-50% + 30px));
      width: min(90vw, 900px);
      text-align: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.45s ease, transform 0.45s ease;
      will-change: opacity, transform;
      pointer-events: none;
    }

    .content.is-visible {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .brand-title {
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 200;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .copy {
      font-size: clamp(0.95rem, 1.4vw, 1.15rem);
      line-height: 1.7;
      opacity: 0.82;
      max-width: 680px;
      margin: 0 auto;
      font-weight: 300;
    }

    .scroll-indicator {
      position: absolute;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .content {
        width: min(92vw, 700px);
      }

      .scroll-indicator {
        bottom: 24px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <div id="scroll-space"></div>

  <main class="immersive-wrapper">
    <!-- Scene 1 -->
    <section class="scene" id="scene-1">
      <canvas id="canvas-1"></canvas>
      <div class="overlay" style="background: rgba(0,0,0,0.30);"></div>
      <div class="content">
        <h1 class="brand-title">Panda Universe</h1>
        <p class="copy">Motion built for space and story.</p>
      </div>
    </section>

    <!-- Scene 2 -->
    <section class="scene" id="scene-2">
      <canvas id="canvas-2"></canvas>
      <div class="overlay" style="background: rgba(0,0,0,0.45);"></div>
      <div class="content">
        <h2 class="section-title">Commercial Experience</h2>
        <p class="copy">Visual systems for immersive moments.</p>
      </div>
    </section>

    <!-- Scene 3 -->
    <section class="scene" id="scene-3">
      <canvas id="canvas-3"></canvas>
      <div class="overlay" style="background: rgba(0,0,0,0.55);"></div>
      <div class="content">
        <h2 class="section-title">Media Art & Direction</h2>
        <p class="copy">3D, motion, and AI-assisted image direction.</p>
      </div>
    </section>

    <div class="scroll-indicator">Scroll</div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const scenes = [
        {
          el: document.getElementById("scene-1"),
          canvas: document.getElementById("canvas-1"),
          folder: "img sequence",
          prefix: "web_01_",
          frameCount: 181
        },
        {
          el: document.getElementById("scene-2"),
          canvas: document.getElementById("canvas-2"),
          folder: "img sequence",
          prefix: "web_02_",
          frameCount: 181
        },
        {
          el: document.getElementById("scene-3"),
          canvas: document.getElementById("canvas-3"),
          folder: "img sequence",
          prefix: "web_03_",
          frameCount: 181
        }
      ];

      const scrollSpace = document.getElementById("scroll-space");
      const totalScenes = scenes.length;

      // 한 씬당 스크롤 길이
      const scrollPerScene = window.innerHeight * 1.7;
      scrollSpace.style.height = `${scrollPerScene * totalScenes}px`;

      function pad(num, size = 5) {
        return String(num).padStart(size, "0");
      }

      function getFramePath(scene, index) {
        return `${scene.folder}/${scene.prefix}${pad(index)}.png`;
      }

      function setupCanvas(scene) {
        const canvas = scene.canvas;
        const ctx = canvas.getContext("2d", { alpha: false });
        scene.ctx = ctx;

        function resizeCanvas() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          if (scene.loadedFrames && scene.loadedFrames[0]) {
            drawFrame(scene, scene.currentFrame || 0);
          }
        }

        scene.resizeCanvas = resizeCanvas;
        resizeCanvas();
      }

      function drawImageCover(ctx, img, canvasWidth, canvasHeight) {
        const imageRatio = img.width / img.height;
        const canvasRatio = canvasWidth / canvasHeight;

        let drawWidth, drawHeight, x, y;

        if (imageRatio > canvasRatio) {
          drawHeight = canvasHeight;
          drawWidth = img.width * (canvasHeight / img.height);
          x = (canvasWidth - drawWidth) / 2;
          y = 0;
        } else {
          drawWidth = canvasWidth;
          drawHeight = img.height * (canvasWidth / img.width);
          x = 0;
          y = (canvasHeight - drawHeight) / 2;
        }

        ctx.drawImage(img, x, y, drawWidth, drawHeight);
      }

      function drawFrame(scene, frameIndex) {
        const img = scene.loadedFrames[frameIndex];
        if (!img) return;

        const ctx = scene.ctx;
        const canvasWidth = window.innerWidth;
        const canvasHeight = window.innerHeight;

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        drawImageCover(ctx, img, canvasWidth, canvasHeight);
        scene.currentFrame = frameIndex;
      }

      function preloadFrames(scene, priority = false) {
        scene.loadedFrames = new Array(scene.frameCount);
        scene.loadedCount = 0;

        return new Promise((resolve) => {
          let resolved = false;

          for (let i = 0; i < scene.frameCount; i++) {
            const img = new Image();
            img.decoding = "async";
            if (priority && i < 20) {
              img.fetchPriority = "high";
            }

            img.src = getFramePath(scene, i);

            img.onload = () => {
              scene.loadedFrames[i] = img;
              scene.loadedCount++;

              if (!resolved && scene.loadedFrames[0]) {
                drawFrame(scene, 0);
                resolved = true;
                resolve();
              }
            };

            img.onerror = () => {
              // 에러 나도 진행은 하되, 첫 프레임조차 못 불러오면 테스트 어려움
              console.warn("Failed to load frame:", getFramePath(scene, i));
            };
          }
        });
      }

      scenes.forEach(setupCanvas);

      // 첫 씬 우선 로드
      await preloadFrames(scenes[0], true);

      // 나머지는 백그라운드 로드
      preloadFrames(scenes[1]);
      preloadFrames(scenes[2]);

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function updateSceneVisibility(scrollY) {
        const currentIndex = clamp(Math.floor(scrollY / scrollPerScene), 0, totalScenes - 1);
        const localY = scrollY - currentIndex * scrollPerScene;
        const progress = clamp(localY / scrollPerScene, 0, 1);

        scenes.forEach((scene, i) => {
          scene.el.style.visibility = "hidden";
          scene.el.style.opacity = 0;
          scene.el.querySelector(".content")?.classList.remove("is-visible");
        });

        const currentScene = scenes[currentIndex];
        const nextScene = scenes[Math.min(currentIndex + 1, totalScenes - 1)];

        if (currentScene) {
          currentScene.el.style.visibility = "visible";
          currentScene.el.style.opacity = 1;

          if (progress > 0.12 && progress < 0.78) {
            currentScene.el.querySelector(".content")?.classList.add("is-visible");
          }
        }

        // 다음 씬이 있다면 크로스페이드
        if (nextScene && nextScene !== currentScene) {
          const fadeStart = 0.72;
          const fadeProgress = clamp((progress - fadeStart) / (1 - fadeStart), 0, 1);

          if (fadeProgress > 0) {
            currentScene.el.style.opacity = 1 - fadeProgress;
            nextScene.el.style.visibility = "visible";
            nextScene.el.style.opacity = fadeProgress;

            if (fadeProgress > 0.35) {
              nextScene.el.querySelector(".content")?.classList.add("is-visible");
            }
          }
        }
      }

      function updateFrames(scrollY) {
        const currentIndex = clamp(Math.floor(scrollY / scrollPerScene), 0, totalScenes - 1);
        const localY = scrollY - currentIndex * scrollPerScene;
        const progress = clamp(localY / scrollPerScene, 0, 1);

        const currentScene = scenes[currentIndex];
        if (!currentScene || !currentScene.loadedFrames) return;

        const frameIndex = clamp(
          Math.round(progress * (currentScene.frameCount - 1)),
          0,
          currentScene.frameCount - 1
        );

        if (frameIndex !== currentScene.currentFrame) {
          drawFrame(currentScene, frameIndex);
        }

        // 다음 씬 첫 프레임 미리 그릴 준비
        const nextScene = scenes[Math.min(currentIndex + 1, totalScenes - 1)];
        if (nextScene && nextScene !== currentScene && nextScene.loadedFrames && nextScene.loadedFrames[0] && nextScene.currentFrame == null) {
          drawFrame(nextScene, 0);
        }
      }

      let ticking = false;

      function updateAll() {
        const scrollY = window.scrollY;
        updateFrames(scrollY);
        updateSceneVisibility(scrollY);
        ticking = false;
      }

      window.addEventListener("scroll", () => {
        if (!ticking) {
          requestAnimationFrame(updateAll);
          ticking = true;
        }
      });

      window.addEventListener("resize", () => {
        const newScrollPerScene = window.innerHeight * 1.7;
        scrollSpace.style.height = `${newScrollPerScene * totalScenes}px`;

        scenes.forEach(scene => {
          scene.resizeCanvas();
        });

        updateAll();
      });

      updateAll();
    });
  </script>
</body>
</html>
